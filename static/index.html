<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Local Portal</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #f97316;
            --primary-dark: #ea580c;
            --bg: #0f0f0f;
            --surface: #1a1a1a;
            --surface-hover: #252525;
            --text: #f5f5f5;
            --text-secondary: #a3a3a3;
            --border: #262626;
            --success: #22c55e;
            --warning: #f59e0b;
            --error: #ef4444;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .app-container {
            position: relative;
            width: 100%;
            height: 100dvh;
            max-width: 430px;
            max-height: 100dvh;
            background: var(--bg);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        @media (min-width: 768px) {
            body {
                background: #0a0a0a;
            }
            .app-container {
                height: 92dvh;
                max-height: 920px;
                border-radius: 24px;
                border: 1px solid var(--border);
                box-shadow: 0 0 60px rgba(0, 0, 0, 0.5), 0 20px 60px rgba(0, 0, 0, 0.3);
            }
        }

        /* Toast 通知 */
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            background: var(--surface);
            color: var(--text);
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 14px;
            z-index: 1000;
            opacity: 0;
            transition: all 0.3s ease;
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        .toast.success {
            border-color: var(--success);
        }

        .toast.error {
            border-color: var(--error);
        }

        .toast-icon {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
        }

        .toast.success .toast-icon {
            background: var(--success);
        }

        .toast.error .toast-icon {
            background: var(--error);
        }

        /* 历史消息区域 */
        .history-container {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            /* 顶部预留工具栏空间 */
            padding-top: calc(56px + env(safe-area-inset-top));
            /* 底部安全区 = 输入框高度(约68px) + 间距(20px) + iPhone安全区 */
            padding-bottom: calc(88px + env(safe-area-inset-bottom));
        }

        /* 消息容器 - 统一使用圆角矩形框 */
        .message-wrapper {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 12px 16px;
            margin-bottom: 16px;
        }

        .message-wrapper .message {
            padding: 8px 0;
            border-bottom: 1px solid var(--border);
        }

        .message-wrapper .message:last-child {
            border-bottom: none;
        }

        /* 消息文本样式 */
        .message-text {
            font-size: 15px;
            color: var(--text);
            line-height: 1.5;
            word-break: break-word;
        }

        /* 消息状态样式 */
        .message-status {
            margin-top: 4px;
            font-size: 11px;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .message-status.sending {
            color: var(--warning);
        }

        .message-status.sent {
            color: var(--success);
        }

        .message-status.failed {
            color: var(--error);
        }

        .message-sender {
            margin-left: 6px;
            padding: 1px 6px;
            background: var(--surface-hover);
            border-radius: 4px;
            font-size: 11px;
            color: var(--text-secondary);
        }

        .message-time {
            margin-left: 8px;
            color: var(--text-secondary);
            opacity: 0.6;
        }

        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: currentColor;
        }

        .message-status.sending .status-dot {
            animation: pulse 1.5s infinite;
        }

        .message-group {
            margin-bottom: 20px;
        }

        .time-divider {
            display: flex;
            align-items: center;
            margin-bottom: 12px;
            color: var(--text-secondary);
            font-size: 12px;
        }

        .time-divider::before,
        .time-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .time-divider::before {
            margin-right: 12px;
        }

        .time-divider::after {
            margin-left: 12px;
        }

        /* 消息项基础样式 */
        .message-item {
            padding: 8px 0;
            line-height: 1.5;
        }
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        /* 底部输入区域 */
        .input-container {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--surface);
            border-top: 1px solid var(--border);
            padding: 12px 16px;
            padding-bottom: max(12px, env(safe-area-inset-bottom));
            display: flex;
            gap: 12px;
            align-items: center;  /* 垂直居中对齐 */
            z-index: 100;
            /* 修复 iOS 键盘弹出时滚动问题 */
            transform: translateZ(0);
            -webkit-transform: translateZ(0);
            will-change: transform;
        }

        .input-wrapper {
            flex: 1;
            position: relative;
        }

        .message-input {
            width: 100%;
            min-height: 44px;  /* 最小高度 */
            max-height: 200px;  /* 最大5行高度 */
            padding: 10px 40px 10px 14px;
            border: 1px solid var(--border);
            border-radius: 12px;
            background: var(--bg);
            color: var(--text);
            font-size: 15px;
            line-height: 1.4;
            resize: none;
            outline: none;
            transition: border-color 0.2s;
            box-sizing: border-box;
            overflow-y: auto;
            /* 初始高度通过JS设置，确保和发送按钮一致 */
        }

        .message-input:focus {
            border-color: var(--primary);
        }

        .expand-btn {
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            width: 28px;
            height: 28px;
            border: none;
            background: transparent;
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
            transition: all 0.2s;
        }

        .expand-btn:hover {
            background: var(--surface-hover);
            color: var(--text);
        }

        .send-btn {
            padding: 0 20px;
            height: 44px;
            border: none;
            border-radius: 12px;
            background: var(--primary);
            color: white;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .send-btn:hover {
            background: var(--primary-dark);
        }

        .send-btn:active {
            transform: scale(0.96);
        }

        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* 全屏输入模式 */
        .fullscreen-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--bg);
            z-index: 100;
            display: none;
            flex-direction: column;
        }

        .fullscreen-overlay.active {
            display: flex;
        }

        .fullscreen-header {
            padding: 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .fullscreen-title {
            font-size: 17px;
            font-weight: 500;
        }

        .fullscreen-close {
            padding: 8px 16px;
            border: none;
            background: var(--surface);
            color: var(--text);
            border-radius: 8px;
            cursor: pointer;
        }

        .fullscreen-textarea {
            flex: 1;
            width: 100%;
            padding: 16px;
            border: none;
            background: var(--bg);
            color: var(--text);
            font-size: 16px;
            line-height: 1.6;
            resize: none;
            outline: none;
        }

        .fullscreen-footer {
            padding: 16px;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: flex-end;
        }

        .fullscreen-send {
            padding: 12px 32px;
            border: none;
            border-radius: 10px;
            background: var(--primary);
            color: white;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
        }

        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }

        .empty-icon {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        .empty-text {
            font-size: 15px;
        }

        /* 连接状态指示器 */
        .connection-indicator {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: var(--surface);
            z-index: 999;
        }

        .connection-indicator::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            width: 0;
            background: var(--primary);
            transition: width 0.3s;
        }

        .connection-indicator.connected::after {
            width: 100%;
            background: var(--success);
        }

        .connection-indicator.connecting::after {
            width: 60%;
            background: var(--warning);
            animation: connecting 1.5s infinite;
        }

        .connection-indicator.disconnected::after {
            width: 100%;
            background: var(--error);
        }

        @keyframes connecting {
            0% { left: -60%; }
            100% { left: 100%; }
        }

        /* 配对码输入对话框 */
        .auth-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            z-index: 200;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .auth-overlay.hidden {
            display: none;
        }

        .auth-container {
            background: var(--surface);
            padding: 32px 24px;
            border-radius: 16px;
            text-align: center;
            width: 90%;
            max-width: 320px;
            border: 1px solid var(--border);
        }

        .auth-container h2 {
            margin: 0 0 8px 0;
            font-size: 20px;
            color: var(--text);
        }

        .auth-container p {
            margin: 0 0 24px 0;
            color: var(--text-secondary);
            font-size: 14px;
        }

        .auth-input {
            width: 100%;
            padding: 12px 16px;
            font-size: 24px;
            letter-spacing: 8px;
            text-align: center;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            outline: none;
            margin-bottom: 16px;
            font-family: monospace;
        }

        .auth-input:focus {
            border-color: var(--primary);
        }

        .auth-btn {
            width: 100%;
            padding: 12px;
            background: var(--primary);
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 16px;
            cursor: pointer;
            font-weight: 500;
        }

        .auth-btn:hover {
            background: var(--primary-dark);
        }

        .auth-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .auth-error {
            color: var(--error);
            font-size: 13px;
            margin-top: 12px;
            min-height: 20px;
        }

        /* 顶部工具栏 */
        .toolbar {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            padding: 12px 16px;
            padding-top: max(12px, env(safe-area-inset-top));
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 50;
            background: linear-gradient(to bottom, rgba(15, 15, 15, 0.95) 0%, rgba(15, 15, 15, 0) 100%);
            pointer-events: none;
        }

        .toolbar-btn {
            width: 36px;
            height: 36px;
            border: none;
            border-radius: 10px;
            background: var(--surface);
            color: var(--text);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            pointer-events: auto;
            border: 1px solid var(--border);
        }

        .toolbar-btn:hover {
            background: var(--surface-hover);
        }

        .toolbar-btn:active {
            transform: scale(0.95);
        }

        .toolbar-btn.hidden {
            display: none;
        }

        /* 设置弹窗 */
        .settings-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 400;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding-top: 60px;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .settings-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .settings-dialog {
            background: var(--surface);
            border-radius: 16px;
            width: 85%;
            max-width: 320px;
            border: 1px solid var(--border);
            padding: 20px;
            transform: translateY(-20px);
            transition: transform 0.3s ease;
        }

        .settings-overlay.active .settings-dialog {
            transform: translateY(0);
        }

        .settings-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .settings-title {
            font-size: 17px;
            font-weight: 600;
        }

        .settings-close {
            width: 28px;
            height: 28px;
            border: none;
            border-radius: 8px;
            background: transparent;
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .settings-close:hover {
            background: var(--surface-hover);
            color: var(--text);
        }

        .settings-section {
            margin-bottom: 16px;
        }

        .settings-label {
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .mode-options {
            display: flex;
            gap: 10px;
        }

        .mode-option {
            flex: 1;
            padding: 14px 12px;
            border: 2px solid var(--border);
            border-radius: 12px;
            background: var(--bg);
            color: var(--text);
            cursor: pointer;
            text-align: center;
            transition: all 0.2s;
        }

        .mode-option:hover {
            border-color: var(--primary);
        }

        .mode-option.selected {
            border-color: var(--primary);
            background: rgba(249, 115, 22, 0.1);
        }

        .mode-option-name {
            font-size: 15px;
            font-weight: 500;
            margin-bottom: 4px;
        }

        .mode-option-desc {
            font-size: 12px;
            color: var(--text-secondary);
        }

        /* 文件选择菜单 */
        .file-menu-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 350;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: all 0.25s ease;
        }

        .file-menu-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .file-menu {
            background: var(--surface);
            border-radius: 16px 16px 0 0;
            width: 100%;
            max-width: 420px;
            border: 1px solid var(--border);
            border-bottom: none;
            padding: 8px 16px calc(16px + env(safe-area-inset-bottom));
            transform: translateY(100%);
            transition: transform 0.25s ease;
        }

        .file-menu-overlay.active .file-menu {
            transform: translateY(0);
        }

        .file-menu-handle {
            width: 36px;
            height: 4px;
            background: var(--border);
            border-radius: 2px;
            margin: 8px auto 16px;
        }

        .file-menu-title {
            font-size: 15px;
            font-weight: 600;
            color: var(--text);
            text-align: center;
            margin-bottom: 16px;
        }

        .file-menu-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 16px;
            border-radius: 12px;
            cursor: pointer;
            transition: background 0.2s;
            margin-bottom: 4px;
        }

        .file-menu-item:hover {
            background: var(--surface-hover);
        }

        .file-menu-item:active {
            background: var(--surface-hover);
            transform: scale(0.98);
        }

        .file-menu-item-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            background: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
        }

        .file-menu-item-text {
            flex: 1;
        }

        .file-menu-item-title {
            font-size: 15px;
            color: var(--text);
            font-weight: 500;
        }

        .file-menu-item-desc {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 2px;
        }

        .file-menu-cancel {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            background: var(--bg);
            color: var(--text);
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            margin-top: 8px;
            transition: background 0.2s;
        }

        .file-menu-cancel:hover {
            background: var(--surface-hover);
        }

        /* 新会话按钮 */
        .new-session-btn {
            width: auto;
            padding: 0 12px;
            font-size: 13px;
            font-weight: 500;
            gap: 4px;
        }

        .new-session-btn.hidden {
            display: none;
        }

        /* 文件选择按钮 */
        .file-btn {
            width: 44px;
            height: 44px;
            border: none;
            border-radius: 12px;
            background: var(--bg);
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .file-btn:hover {
            background: var(--surface-hover);
            color: var(--text);
        }

        .file-btn:active {
            transform: scale(0.95);
        }

        /* 文件传输进度弹窗 */
        .file-transfer-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            z-index: 300;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .file-transfer-overlay.hidden {
            display: none;
        }

        .file-transfer-dialog {
            background: var(--surface);
            padding: 24px;
            border-radius: 16px;
            width: 90%;
            max-width: 320px;
            border: 1px solid var(--border);
        }

        .file-info {
            display: flex;
            justify-content: space-between;
            margin-bottom: 16px;
            font-size: 14px;
        }

        .file-name {
            color: var(--text);
            font-weight: 500;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            max-width: 70%;
        }

        .file-size {
            color: var(--text-secondary);
        }

        .progress-bar {
            height: 6px;
            background: var(--border);
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 12px;
        }

        .progress-fill {
            height: 100%;
            background: var(--primary);
            border-radius: 3px;
            transition: width 0.3s ease;
        }

        .progress-text {
            text-align: center;
            color: var(--text-secondary);
            font-size: 13px;
            margin-bottom: 16px;
        }

        .cancel-btn {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 8px;
            background: var(--surface-hover);
            color: var(--text);
            font-size: 15px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .cancel-btn:hover {
            background: var(--error);
            color: white;
        }
    </style>
</head>
<body>
    <div class="app-container">
    <!-- 连接状态指示条 -->
    <div class="connection-indicator" id="connectionIndicator"></div>

    <!-- Toast 通知 -->
    <div class="toast" id="toast">
        <span class="toast-icon">✓</span>
        <span class="toast-text"></span>
    </div>

    <!-- 配对码输入对话框 -->
    <div class="auth-overlay hidden" id="authOverlay">
        <div class="auth-container">
            <h2>连接 Local Portal</h2>
            <p>请输入电脑端显示的 4 位配对码</p>
            <input type="text" class="auth-input" id="authInput" maxlength="4" placeholder="0000">
            <button class="auth-btn" id="authBtn">连接</button>
            <div class="auth-error" id="authError"></div>
        </div>
    </div>

    <!-- 设备注册对话框 -->
    <div class="auth-overlay hidden" id="registerOverlay">
        <div class="auth-container">
            <h2>设备注册</h2>
            <p>请输入设备名称（不可与其他在线设备重复）</p>
            <input type="text" class="auth-input" id="registerInput" maxlength="16" placeholder="我的手机" style="letter-spacing: 1px; font-family: inherit;">
            <button class="auth-btn" id="registerBtn">注册</button>
            <div class="auth-error" id="registerError"></div>
        </div>
    </div>

    <!-- 设置弹窗 -->
    <div class="settings-overlay" id="settingsOverlay">
        <div class="settings-dialog">
            <div class="settings-header">

    <!-- 顶部工具栏 -->
    <div class="toolbar" id="toolbar">
        <div style="display: flex; align-items: center; gap: 8px;">

            </svg>

        </div>
        <div style="display: flex; align-items: center; gap: 8px;">
            <span id="deviceIdLabel" style="font-size: 12px; color: var(--text-secondary); display: none;"></span>

    <!-- 历史消息区域 -->

    <div class="file-menu-overlay" id="fileMenuOverlay">
        <div class="file-menu">

    <!-- 底部输入区域 -->
    <div class="input-container">
        <!-- 文件选择按钮 -->
        <button class="file-btn" id="fileBtn" title="发送图片/视频">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
            </svg>
        </button>
        <input type="file" id="fileInput" accept="image/*,video/*" style="display: none;" multiple>
        
        <div class="input-wrapper">
            <textarea 
                class="message-input" 
                id="messageInput"
                placeholder="请输入"
                rows="2"
            ></textarea>
            <button class="expand-btn" id="expandBtn" title="全屏输入">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/>

    <!-- 全屏输入覆盖层 -->
    <div class="fullscreen-overlay" id="fullscreenOverlay">
        <div class="fullscreen-header">
            <span class="fullscreen-title">输入消息</span>
            <button class="fullscreen-close" id="fullscreenClose">取消</button>
        </div>
        <textarea 
            class="fullscreen-textarea" 
            id="fullscreenTextarea"
            placeholder="请输入"
        ></textarea>
        <div class="fullscreen-footer">
            <button class="fullscreen-send" id="fullscreenSend">发送</button>
        </div>
    </div>

    <script>
        // WebSocket 连接
        let ws = null;
        let reconnectAttempts = 0;
        const maxReconnectAttempts = 5;

        // DOM 元素
        const historyContainer = document.getElementById('historyContainer');
        const emptyState = document.getElementById('emptyState');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const expandBtn = document.getElementById('expandBtn');
        const fullscreenOverlay = document.getElementById('fullscreenOverlay');
        const fullscreenTextarea = document.getElementById('fullscreenTextarea');
        const fullscreenClose = document.getElementById('fullscreenClose');
        const fullscreenSend = document.getElementById('fullscreenSend');
        const toast = document.getElementById('toast');
        const connectionIndicator = document.getElementById('connectionIndicator');
        
        // 设置相关元素
        const settingsOverlay = document.getElementById('settingsOverlay');
        const settingsBtn = document.getElementById('settingsBtn');
        const settingsClose = document.getElementById('settingsClose');
        const modeCover = document.getElementById('modeCover');
        const modeAdd = document.getElementById('modeAdd');
        const newSessionBtn = document.getElementById('newSessionBtn');
        
        // 文件传输元素
        const fileBtn = document.getElementById('fileBtn');
        const fileInput = document.getElementById('fileInput');
        const fileTransferOverlay = document.getElementById('fileTransferOverlay');
        const fileName = document.getElementById('fileName');
        const fileSize = document.getElementById('fileSize');
        const progressFill = document.getElementById('progressFill');
        const progressText = document.getElementById('progressText');
        const cancelTransferBtn = document.getElementById('cancelTransferBtn');

        // 文件选择菜单元素
        const fileMenuOverlay = document.getElementById('fileMenuOverlay');
        const menuAnyFile = document.getElementById('menuAnyFile');
        const menuImageVideo = document.getElementById('menuImageVideo');
        const fileMenuCancel = document.getElementById('fileMenuCancel');
        
        // 配对码输入元素
        const authOverlay = document.getElementById('authOverlay');
        const authInput = document.getElementById('authInput');
        const authBtn = document.getElementById('authBtn');
        const authError = document.getElementById('authError');
        
        // 设备注册元素
        const registerOverlay = document.getElementById('registerOverlay');
        const registerInput = document.getElementById('registerInput');
        const registerBtn = document.getElementById('registerBtn');
        const registerError = document.getElementById('registerError');
        
        // 当前设备信息
        let currentDeviceName = '';
        let currentLoginId = '';

        // 消息存储
        let messages = [];
        let pairingCode = '';
        let isAuthenticated = false;
        let isManualInputMode = false;  // 标记是否处于手动输入模式（避免重连时重置）
        let isConnecting = false;  // 标记是否正在连接中，防止重复连接
        
        // 服务端发送的文件接收缓存
        let serverFileReceive = {
            file_id: null,
            name: '',
            size: 0,
            mime_type: '',
            chunks: [],
            received_chunks: 0,
            total_chunks: 0
        };
        
        // 复制模式：'cover' (覆盖) 或 'add' (追加)
        let copyMode = getCopyModeFromStorage();

        // 从 URL 获取配对码
        function getCodeFromUrl() {
            const params = new URLSearchParams(window.location.search);
            return params.get('code') || '';
        }

        // 从 localStorage 获取配对码（改用持久化存储，避免后台挂起丢失）
        function getCodeFromStorage() {
            try {
                return localStorage.getItem('lportal_code') || '';
            } catch (e) {
                return '';
            }
        }

        // 保存配对码到 localStorage
        function saveCodeToStorage(code) {
            try {
                localStorage.setItem('lportal_code', code);
            } catch (e) {
                // 忽略存储错误
            }
        }
        
        // 从 localStorage 获取复制模式
        function getCopyModeFromStorage() {
            try {
                return localStorage.getItem('lportal_copy_mode') || 'cover';
            } catch (e) {
                return 'cover';
            }
        }
        
        // 保存复制模式到 localStorage
        function saveCopyModeToStorage(mode) {
            try {
                localStorage.setItem('lportal_copy_mode', mode);
            } catch (e) {
                // 忽略存储错误
            }
        }
        
        // 从 localStorage 获取设备信息
        function getDeviceFromStorage() {
            try {
                const name = localStorage.getItem('lportal_device_name');
                const loginId = localStorage.getItem('lportal_login_id');
                return name && loginId ? { name, loginId } : null;
            } catch (e) {
                return null;
            }
        }
        
        // 保存设备信息到 localStorage
        function saveDeviceToStorage(name, loginId) {
            try {
                localStorage.setItem('lportal_device_name', name);
                localStorage.setItem('lportal_login_id', loginId);
            } catch (e) {
                // 忽略存储错误
            }
        }
        
        // 清除设备信息
        function clearDeviceFromStorage() {
            try {
                localStorage.removeItem('lportal_device_name');
                localStorage.removeItem('lportal_login_id');
            } catch (e) {
                // 忽略存储错误
            }
        }
        
        // 更新模式选择 UI
        function updateModeUI() {
            if (copyMode === 'cover') {
                modeCover.classList.add('selected');
                modeAdd.classList.remove('selected');
                newSessionBtn.classList.add('hidden');
            } else {
                modeCover.classList.remove('selected');
                modeAdd.classList.add('selected');
                newSessionBtn.classList.remove('hidden');
            }
        }
        
        // 设置复制模式
        function setCopyMode(mode) {
            if (mode !== 'cover' && mode !== 'add') return;
            
            // 发送到服务器
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({
                    type: 'command',
                    command: 'set_mode',
                    mode: mode
                }));
            } else {
                showToast('未连接到服务器', 'error');
                return;
            }
            
            copyMode = mode;
            saveCopyModeToStorage(mode);
            updateModeUI();
        }
        
        // 发送新会话命令
        function sendNewSession() {
            if (copyMode !== 'add') return;
            
            // 通过 WebSocket 发送新会话请求
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({
                    type: 'command',
                    command: 'new_session'
                }));
                showToast('已刷新会话');
            } else {
                showToast('未连接到服务器', 'error');
            }
        }
        
        // 打开设置弹窗
        function openSettings() {
            updateModeUI();
            settingsOverlay.classList.add('active');
        }
        
        // 关闭设置弹窗
        function closeSettings() {
            settingsOverlay.classList.remove('active');
        }

        // 连接 WebSocket
        function connect() {
            // 防止重复连接
            if (isConnecting) {
                console.log('Already connecting, skip...');
                return;
            }
            
            // 如果已有连接，先关闭
            if (ws && (ws.readyState === WebSocket.CONNECTING || ws.readyState === WebSocket.OPEN)) {
                console.log('Closing existing connection...');
                ws.close();
            }
            
            isConnecting = true;
            updateConnectionStatus('connecting');
            
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = `${protocol}//${window.location.host}/ws`;
            
            console.log('Creating new WebSocket connection...');
            ws = new WebSocket(wsUrl);
            
            ws.onopen = () => {
                console.log('WebSocket connected');
                isConnecting = false;
                reconnectAttempts = 0;
                
                // 如果处于手动输入模式（用户正在输入配对码），不要自动发送
                if (isManualInputMode) {
                    console.log('Manual input mode, skip auto auth');
                    return;
                }
                
                // 首次连接：优先级 URL > localStorage > 输入框
                const code = getCodeFromUrl() || getCodeFromStorage();
                if (code) {
                    console.log('Auto sending auth code from URL/Storage');
                    ws.send(JSON.stringify({ type: 'auth', code: code }));
                } else {
                    // 显示配对码输入框
                    showAuthDialog();
                }
            };
            
            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                handleServerMessage(data);
            };
            
            ws.onclose = () => {
                console.log('WebSocket closed');
                isConnecting = false;
                updateConnectionStatus('disconnected');
                
                // 如果处于手动输入模式，不重连（避免打断用户输入）
                if (isManualInputMode) {
                    console.log('Manual input mode, skip reconnect');
                    return;
                }
                
                // 如果已认证，尝试重连
                if (isAuthenticated && reconnectAttempts < maxReconnectAttempts) {
                    reconnectAttempts++;
                    console.log(`Reconnecting... attempt ${reconnectAttempts}`);
                    setTimeout(connect, 2000 * reconnectAttempts);
                }
            };
            
            ws.onerror = (error) => {
                console.error('WebSocket error:', error);
                showToast('连接错误', 'error');
            };
        }

        // 显示配对码输入对话框
        function showAuthDialog() {
            isManualInputMode = true;
            authOverlay.classList.remove('hidden');
            authInput.value = '';
            authError.textContent = '';
            authBtn.disabled = false;
            authBtn.textContent = '连接';
            authInput.focus();
        }

        // 隐藏配对码输入对话框
        function hideAuthDialog() {
            authOverlay.classList.add('hidden');
            isManualInputMode = false;
        }
        
        // 显示设备注册对话框
        function showRegisterDialog() {
            registerOverlay.classList.remove('hidden');
            registerInput.value = '';
            registerError.textContent = '';
            registerBtn.disabled = false;
            registerBtn.textContent = '注册';
            registerInput.focus();
        }
        
        // 隐藏设备注册对话框
        function hideRegisterDialog() {
            registerOverlay.classList.add('hidden');
        }
        
        // 发送设备注册
        function sendRegister() {
            const name = registerInput.value.trim();
            if (!name) {
                registerError.textContent = '请输入设备名称';
                return;
            }
            registerError.textContent = '';
            registerBtn.disabled = true;
            registerBtn.textContent = '注册中...';
            
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ type: 'register', device_name: name }));
            } else {
                registerError.textContent = '连接已断开';
                registerBtn.disabled = false;
                registerBtn.textContent = '注册';
            }
        }

        // 发送配对码
        function sendAuthCode() {
            const code = authInput.value.trim();
            if (code.length !== 4 || !/^\d{4}$/.test(code)) {
                authError.textContent = '请输入 4 位数字配对码';
                return;
            }
            authError.textContent = '';
            authBtn.disabled = true;
            authBtn.textContent = '连接中...';
            
            pairingCode = code;
            isManualInputMode = false;  // 发送后退出手动输入模式
            // 保存到 localStorage，便于重连时自动使用
            saveCodeToStorage(code);
            
            // 确保 WebSocket 连接正常
            if (!ws || ws.readyState !== WebSocket.OPEN) {
                console.log('WebSocket not open, connecting first...');
                connect();
                // 等待连接成功后发送（通过 onopen 回调）
                return;
            }
            
            ws.send(JSON.stringify({ type: 'auth', code: code }));
        }

        // 更新连接状态指示器
        function updateConnectionStatus(status) {
            connectionIndicator.className = 'connection-indicator ' + status;
        }

        // 处理服务器消息
        function handleServerMessage(data) {
            switch (data.type) {
                case 'auth_success':
                    // 配对码验证成功，进入设备注册
                    isAuthenticated = true;
                    isManualInputMode = false;
                    reconnectAttempts = 0;
                    updateConnectionStatus('connected');
                    hideAuthDialog();
                    
                    // 检查是否有保存的设备信息，尝试自动注册
                    const savedDevice = getDeviceFromStorage();
                    if (savedDevice) {
                        // 自动发送注册请求
                        currentDeviceName = savedDevice.name;
                        ws.send(JSON.stringify({ 
                            type: 'register', 
                            device_name: savedDevice.name 
                        }));
                    } else {
                        showRegisterDialog();
                    }
                    break;
                    
                case 'register_success':
                    // 设备注册成功
                    currentDeviceName = data.device_name || '';
                    currentLoginId = data.login_id || '';
                    hideRegisterDialog();
                    showToast(`已注册: ${currentDeviceName}`, 'success');
                    // 显示 login_id
                    const deviceIdLabel = document.getElementById('deviceIdLabel');
                    if (deviceIdLabel) {
                        deviceIdLabel.textContent = currentLoginId;
                        deviceIdLabel.style.display = 'inline';
                    }
                    // 保存设备信息和配对码到 localStorage，便于重连
                    saveDeviceToStorage(currentDeviceName, currentLoginId);
                    const currentCode = getCodeFromStorage() || getCodeFromUrl();
                    if (currentCode) {
                        saveCodeToStorage(currentCode);
                    }
                    break;
                    
                case 'register_failed':
                    // 设备注册失败
                    registerError.textContent = data.message || '注册失败';
                    registerBtn.disabled = false;
                    registerBtn.textContent = '注册';
                    // 如果是自动注册失败，清除保存的设备信息
                    clearDeviceFromStorage();
                    showRegisterDialog();
                    break;
                    
                case 'auth_failed':
                    // 配对码验证失败
                    isAuthenticated = false;
                    isManualInputMode = true;  // 保持手动输入模式，避免重连干扰
                    // 显示输入框让用户重新输入
                    showAuthDialog();
                    authError.textContent = data.message || '配对码错误';
                    authBtn.disabled = false;
                    authBtn.textContent = '连接';
                    // 清除 localStorage 中的过期配对码
                    localStorage.removeItem('lportal_code');
                    break;
                    
                case 'history':
                    // 加载历史消息（服务器返回的是倒序，需要反转）
                    messages = (data.data || []).reverse();
                    // 对历史记录中的文件消息补充 HTTP URL（避免 blob URL 刷新失效）
                    messages.forEach(msg => {
                        if (msg.file_id) {
                            const fileUrl = `/files/${msg.file_id}`;
                            if (msg.mime_type && msg.mime_type.startsWith('image/')) {
                                msg.media_type = 'image';
                                msg.media_url = fileUrl;
                            } else if (msg.mime_type && msg.mime_type.startsWith('video/')) {
                                msg.media_type = 'video';
                                msg.media_url = fileUrl;
                            } else {
                                msg.download_url = fileUrl;
                                msg.download_name = msg.file_name || msg.text;
                            }
                        }
                    });
                    renderMessages();
                    scrollToBottom();
                    break;
                    
                case 'new':
                    // 新消息（广播）
                    // 检查是否是本地已发送的消息（通过 client_id 匹配）
                    const existingIndex = messages.findIndex(m => m.id == data.data.client_id);
                    if (existingIndex !== -1) {
                        // 更新本地消息为已发送状态
                        messages[existingIndex].id = data.data.id;
                        messages[existingIndex].status = 'sent';
                        messages[existingIndex].session_id = data.data.session_id;  // 关键：更新 session_id
                        renderMessages();
                    } else {
                        // 新消息，添加到列表
                        messages.push(data.data);
                        renderMessages();
                    }
                    scrollToBottom();
                    break;
                    
                case 'ack':
                    // 消息确认，更新发送状态
                    updateMessageStatus(data.id, 'sent');
                    break;
                    
                case 'file_accept':
                    // 服务端接受文件传输
                    showFileProgress();
                    break;
                    
                case 'file_progress':
                    // 更新传输进度
                    updateFileProgress(data.received, data.total);
                    break;
                    
                case 'file_saved':
                    // 文件保存完成
                    hideFileProgress();
                    showToast(`文件已保存: ${data.path.split('/').pop()}`, 'success');
                    break;
                    
                case 'file_error':
                    // 文件传输错误
                    hideFileProgress();
                    showToast(data.error || '文件传输失败', 'error');
                    break;
                    
                case 'session_reset':
                    // 会话已刷新（追加模式）
                    showToast(data.message || '会话已刷新', 'success');
                    break;
                    
                case 'mode_changed':
                    // 模式已切换
                    copyMode = data.mode;
                    saveCopyModeToStorage(data.mode);
                    updateModeUI();
                    showToast(data.message || `已切换到${data.mode === 'add' ? '追加' : '覆盖'}模式`, 'success');
                    break;
                    
                case 'server_text':
                    // 服务端发来的文本消息
                    messages.push(data.data);
                    renderMessages();
                    scrollToBottom();
                    break;
                    
                case 'server_file_ready':
                    // 服务端通过 HTTP 提供文件下载（流式，支持大文件）
                    {
                        const dlUrl = data.download_url || `/files/${data.file_id}`;
                        let mediaType = '';
                        if (data.mime_type && data.mime_type.startsWith('image/')) {
                            mediaType = 'image';
                        } else if (data.mime_type && data.mime_type.startsWith('video/')) {
                            mediaType = 'video';
                        }
                        const fileMsg = {
                            id: Date.now(),
                            text: `[文件] ${data.name} (${formatSize(data.size)})`,
                            preview: `[文件] ${data.name}`,
                            time: new Date().toISOString(),
                            session_id: -Date.now(),
                            device_name: '服务端',
                            login_id: 'server',
                            media_type: mediaType,
                            media_url: mediaType ? dlUrl : '',
                            download_url: mediaType ? '' : dlUrl,
                            download_name: data.name,
                            file_id: data.file_id,
                            size: data.size
                        };
                        messages.push(fileMsg);
                        renderMessages();
                        scrollToBottom();
                        showToast(`已接收文件: ${data.name}`, 'success');
                    }
                    break;
                    
                // 以下保留兼容旧版 WS 二进制分片推送（已不再使用）
                case 'server_file_start':
                case 'server_file_chunk':
                case 'server_file_end':
                    break;
                    
                case 'server_close':
                    // 服务器关闭通知
                    showToast('服务已关闭', 'error');
                    updateConnectionStatus('disconnected');
                    isAuthenticated = false;
                    if (ws) {
                        ws.close();
                    }
                    break;
            }
        }

        // 滚动到底部
        function scrollToBottom() {
            historyContainer.scrollTop = historyContainer.scrollHeight;
        }

        // 渲染消息列表
        function renderMessages() {
            if (messages.length === 0) {
                emptyState.style.display = 'block';
                historyContainer.innerHTML = '';
                historyContainer.appendChild(emptyState);
                return;
            }
            
            emptyState.style.display = 'none';
            
            // 按 session_id 和时间分组
            let html = '';
            let currentDate = null;
            
            // 先按时间正序遍历，处理 session 分组
            const processMessages = () => {
                let result = '';
                let i = 0;
                
                while (i < messages.length) {
                    const msg = messages[i];
                    const msgDate = formatDate(msg.time);
                    
                    // 日期分隔线
                    if (msgDate !== currentDate) {
                        currentDate = msgDate;
                        result += `<div class="time-divider">${msgDate}</div>`;
                    }
                    
                    // 统计同一 session 的消息数量
                    let sessionMessages = [msg];
                    let j = i + 1;
                    while (j < messages.length) {
                        const nextMsg = messages[j];
                        if (nextMsg.session_id === msg.session_id && formatDate(nextMsg.time) === msgDate) {
                            sessionMessages.push(nextMsg);
                            j++;
                        } else {
                            break;
                        }
                    }
                    
                    // 统一使用 message-wrapper 包裹（单条或多条都框起来）
                    let groupHtml = '';
                    sessionMessages.forEach(m => {
                        groupHtml += renderMessageItem(m);
                    });
                    result += `<div class="message-wrapper">${groupHtml}</div>`;
                    
                    i = j;
                }
                
                return result;
            };
            
            html = processMessages();
            historyContainer.innerHTML = html;
        }
        
        // 渲染单条消息
        function renderMessageItem(msg) {
            const statusClass = msg.status || 'sent';
            const statusText = {
                'sending': '发送中...',
                'sent': '已接收',
                'failed': '发送失败'
            }[statusClass];
            
            // 格式化发送时间 (HH:MM:SS)
            const msgTime = new Date(msg.time);
            const timeStr = `${msgTime.getHours().toString().padStart(2, '0')}:${msgTime.getMinutes().toString().padStart(2, '0')}:${msgTime.getSeconds().toString().padStart(2, '0')}`;
            
            let contentHtml = '';
            if (msg.media_type === 'image') {
                contentHtml = `<img src="${msg.media_url}" style="max-width:100%;border-radius:8px;display:block;cursor:pointer;" alt="图片" onclick="window.open(this.src)">`;
            } else if (msg.media_type === 'video') {
                contentHtml = `<video src="${msg.media_url}" controls style="max-width:100%;border-radius:8px;display:block;"></video>`;
            } else if (msg.download_url) {
                // 可下载文件卡片
                contentHtml = `
                    <a href="${msg.download_url}" download="${msg.download_name || ''}" style="text-decoration:none;color:inherit;display:block;">
                        <div style="background:var(--surface-hover);padding:12px 14px;border-radius:10px;display:flex;align-items:center;gap:10px;max-width:260px;">
                            <span style="font-size:22px;">📎</span>
                            <div style="flex:1;min-width:0;">
                                <div style="font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text);">${escapeHtml(msg.download_name || msg.text)}</div>
                                <div style="font-size:12px;color:var(--primary);margin-top:2px;">点击下载</div>
                            </div>
                        </div>
                    </a>
                `;
            } else {
                contentHtml = `<div class="message-text">${escapeHtml(msg.text)}</div>`;
            }
            
            let senderLabel = '';
            if (msg.login_id === 'server') {
                senderLabel = '服务端';
            } else if (msg.login_id === currentLoginId) {
                senderLabel = '本设备';
            } else if (msg.device_name) {
                senderLabel = msg.device_name;
            }

            return `
                <div class="message-item" data-id="${msg.id}">
                    ${contentHtml}
                    <div class="message-status ${statusClass}">
                        <span class="status-dot"></span>
                        <span>${statusText}</span>
                        ${senderLabel ? `<span class="message-sender">${escapeHtml(senderLabel)}</span>` : ''}
                        <span class="message-time">${timeStr}</span>
                    </div>
                </div>
            `;
        }

        // 更新消息状态
        function updateMessageStatus(id, status) {
            // 1. 先更新 messages 数组中的状态（关键！避免重新渲染时覆盖）
            const msgIndex = messages.findIndex(m => m.id == id);
            if (msgIndex !== -1) {
                messages[msgIndex].status = status;
            }
            
            // 2. 更新 DOM
            const msgEl = document.querySelector(`[data-id="${id}"]`);
            if (msgEl) {
                const statusEl = msgEl.querySelector('.message-status');
                statusEl.className = 'message-status ' + status;
                
                const statusText = {
                    'sent': '已接收',
                    'failed': '发送失败'
                }[status] || '已接收';
                
                // 更新状态文本（第二个 span，第一个是 dot，第二个是状态文本）
                const statusTextEl = statusEl.querySelectorAll('span')[1];
                if (statusTextEl) {
                    statusTextEl.textContent = statusText;
                }
            }
        }

        // 发送消息
        function sendMessage(text, isFullscreen = false) {
            text = text.trim();
            if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;
            
            // 生成临时 ID
            const tempId = 'temp_' + Date.now();
            
            // 添加到本地消息列表（显示发送中状态）
            const msg = {
                id: tempId,
                text: text,
                time: new Date().toISOString(),
                status: 'sending'
            };
            
            messages.push(msg);
            renderMessages();
            // 滚动到底部显示最新消息
            scrollToBottom();
            
            // 清空输入框
            if (isFullscreen) {
                fullscreenTextarea.value = '';
                closeFullscreen();
            } else {
                messageInput.value = '';
                messageInput.style.height = 'auto';
            }
            
            // 发送（包含 client_id 以便服务端正确返回 ack）
            ws.send(JSON.stringify({
                type: 'text',
                content: text,
                client_id: tempId,
                timestamp: Date.now()
            }));
        }

        // 显示 Toast
        function showToast(message, type = 'success') {
            const toastText = toast.querySelector('.toast-text');
            const toastIcon = toast.querySelector('.toast-icon');
            
            toastText.textContent = message;
            toastIcon.textContent = type === 'success' ? '✓' : '✗';
            toast.className = 'toast show ' + type;
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // 打开全屏输入
        function openFullscreen() {
            fullscreenTextarea.value = messageInput.value;
            fullscreenOverlay.classList.add('active');
            fullscreenTextarea.focus();
        }

        // 关闭全屏输入
        function closeFullscreen() {
            // 将全屏输入框的内容同步回小框
            messageInput.value = fullscreenTextarea.value;
            // 重置高度后再触发自适应，避免 scrollHeight 残留导致高度跑偏
            messageInput.style.height = '44px';
            messageInput.dispatchEvent(new Event('input'));
            fullscreenOverlay.classList.remove('active');
        }

        // 格式化日期
        function formatDate(isoString) {
            const date = new Date(isoString);
            const now = new Date();
            const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
            const msgDate = new Date(date.getFullYear(), date.getMonth(), date.getDate());
            
            if (msgDate.getTime() === today.getTime()) {
                return '今天';
            }
            
            const yesterday = new Date(today);
            yesterday.setDate(yesterday.getDate() - 1);
            if (msgDate.getTime() === yesterday.getTime()) {
                return '昨天';
            }
            
            return `${date.getMonth() + 1}月${date.getDate()}日`;
        }

        // 转义 HTML
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 配对码输入事件
        authBtn.addEventListener('click', sendAuthCode);
        
        authInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                sendAuthCode();
            }
        });
        
        // 限制输入只能数字
        authInput.addEventListener('input', function() {
            this.value = this.value.replace(/\D/g, '').slice(0, 4);
        });
        
        // 设备注册事件
        registerBtn.addEventListener('click', sendRegister);
        registerInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                sendRegister();
            }
        });
        
        // 文件选择按钮
        fileBtn.addEventListener('click', () => {
            fileMenuOverlay.classList.add('active');
        });

        // 文件菜单项 - 任意文件
        menuAnyFile.addEventListener('click', () => {
            fileInput.setAttribute('accept', '*/*');
            fileMenuOverlay.classList.remove('active');
            fileInput.click();
        });

        // 文件菜单项 - 图片/视频
        menuImageVideo.addEventListener('click', () => {
            fileInput.setAttribute('accept', 'image/*,video/*');
            fileMenuOverlay.classList.remove('active');
            fileInput.click();
        });

        // 文件菜单 - 取消按钮
        fileMenuCancel.addEventListener('click', () => {
            fileMenuOverlay.classList.remove('active');
        });

        // 文件菜单 - 点击遮罩关闭
        fileMenuOverlay.addEventListener('click', (e) => {
            if (e.target === fileMenuOverlay) {
                fileMenuOverlay.classList.remove('active');
            }
        });

        // 文件选择
        fileInput.addEventListener('change', (e) => {
            const files = e.target.files;
            if (files.length > 0) {
                // 目前一次只处理一个文件
                sendFile(files[0]);
            }
            // 清空选择，允许重复选择同一文件
            fileInput.value = '';
        });
        
        // 取消传输
        cancelTransferBtn.addEventListener('click', () => {
            if (currentFileTransfer) {
                currentFileTransfer.cancelled = true;
                hideFileProgress();
                showToast('已取消传输', 'warning');
            }
        });

        // 事件监听
        sendBtn.addEventListener('click', () => {
            sendMessage(messageInput.value);
        });

        expandBtn.addEventListener('click', openFullscreen);

        fullscreenClose.addEventListener('click', closeFullscreen);

        fullscreenSend.addEventListener('click', () => {
            sendMessage(fullscreenTextarea.value, true);
        });

        // 格式化文件大小（全局复用）
        function formatSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
            if (bytes < 1024 * 1024 * 1024) return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
            return (bytes / (1024 * 1024 * 1024)).toFixed(2) + ' GB';
        }

        // 文件传输相关变量
        let currentFileTransfer = null;
        
        // 显示文件传输进度
        function showFileProgress() {
            fileTransferOverlay.classList.remove('hidden');
        }
        
        // 隐藏文件传输进度
        function hideFileProgress() {
            fileTransferOverlay.classList.add('hidden');
            currentFileTransfer = null;
        }
        
        // 更新传输进度
        function updateFileProgress(received, total) {
            const percent = total > 0 ? Math.round((received / total) * 100) : 0;
            progressFill.style.width = percent + '%';
            progressText.textContent = `${percent}% (${formatSize(received)} / ${formatSize(total)})`;
        }
        
        // 发送文件（HTTP 流式分片上传，支持大文件）
        async function sendFile(file) {
            if (!ws || ws.readyState !== WebSocket.OPEN) {
                showToast('未连接到服务器', 'error');
                return;
            }
            
            // 显示文件信息
            fileName.textContent = file.name;
            fileSize.textContent = formatSize(file.size);
            progressFill.style.width = '0%';
            progressText.textContent = '0% (0 / ' + formatSize(file.size) + ')';
            fileTransferOverlay.classList.remove('hidden');
            
            let fileId = null;
            currentFileTransfer = { name: file.name, size: file.size, cancelled: false };
            
            try {
                // 1. 初始化上传
                const initRes = await fetch(`/upload/init?login_id=${encodeURIComponent(currentLoginId)}&name=${encodeURIComponent(file.name)}&size=${file.size}&mime=${encodeURIComponent(file.type || 'application/octet-stream')}`, {
                    method: 'POST'
                });
                if (!initRes.ok) {
                    const errData = await initRes.json().catch(() => ({}));
                    throw new Error(errData.error || '初始化上传失败');
                }
                const initData = await initRes.json();
                fileId = initData.fileId;
                const chunkSize = initData.chunkSize || (1024 * 1024);
                
                // 2. 分片上传（顺序发送，内存中只保留当前分片）
                const totalChunks = Math.ceil(file.size / chunkSize);
                for (let i = 0; i < totalChunks; i++) {
                    if (!currentFileTransfer || currentFileTransfer.cancelled) {
                        throw new Error('已取消');
                    }
                    
                    const start = i * chunkSize;
                    const end = Math.min(start + chunkSize, file.size);
                    const chunk = file.slice(start, end);
                    
                    const chunkRes = await fetch(`/upload/chunk/${fileId}/${i}`, {
                        method: 'POST',
                        body: chunk
                    });
                    if (!chunkRes.ok) {
                        const errData = await chunkRes.json().catch(() => ({}));
                        throw new Error(errData.error || `分片 ${i + 1}/${totalChunks} 上传失败`);
                    }
                    
                    updateFileProgress(end, file.size);
                    
                    // 微小延迟，避免浏览器并发阻塞
                    await new Promise(r => setTimeout(r, 5));
                }
                
                if (!currentFileTransfer || currentFileTransfer.cancelled) {
                    throw new Error('已取消');
                }
                
                // 3. 完成上传
                const completeRes = await fetch(`/upload/complete/${fileId}`, {
                    method: 'POST'
                });
                if (!completeRes.ok) {
                    const errData = await completeRes.json().catch(() => ({}));
                    throw new Error(errData.error || '完成上传失败');
                }
                
                hideFileProgress();
                showToast(`文件已发送: ${file.name}`, 'success');
                
            } catch (error) {
                if (fileId && ws && ws.readyState === WebSocket.OPEN) {
                    ws.send(JSON.stringify({ type: 'file_cancel', file_id: fileId }));
                }
                hideFileProgress();
                if (error.message === '已取消') {
                    showToast('已取消传输', 'warning');
                } else {
                    showToast('文件传输失败: ' + error.message, 'error');
                }
            }
        }
        
        // 设置初始高度（和发送按钮一致）
        messageInput.style.height = '44px';
        
        // 输入框自适应高度（最多5行，约200px）
        messageInput.addEventListener('input', function() {
            // 临时移除高度限制，获取自然高度
            this.style.height = 'auto';

            // 空内容保持默认 44px，避免 rows="2" 的 scrollHeight 拉高输入框
            const newHeight = this.value.trim()
                ? Math.max(44, Math.min(this.scrollHeight, 200))
                : 44;
            this.style.height = newHeight + 'px';

            // 控制滚动条显示
            if (newHeight >= 200) {
                this.style.overflowY = 'auto';
            } else {
                this.style.overflowY = 'hidden';
            }
        });

        // Enter 发送，Shift+Enter 换行
        messageInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage(this.value);
            }
        });

        fullscreenTextarea.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage(this.value, true);
            }
        });

        // 页面关闭时关闭 WebSocket
        window.addEventListener('beforeunload', () => {
            if (ws) {
                ws.close();
            }
        });

        // 监听视觉视口变化（修复 iOS 键盘弹出时输入框位置问题）
        if (window.visualViewport) {
            window.visualViewport.addEventListener('resize', () => {
                // 当键盘弹出/收起时，调整输入框位置
                const vv = window.visualViewport;
                const inputContainer = document.querySelector('.input-container');
                if (inputContainer && vv) {
                    // 计算 visual viewport 底部相对于 layout viewport 的偏移
                    const offset = vv.height < window.innerHeight ? 
                        window.innerHeight - vv.height : 0;
                    inputContainer.style.transform = `translateY(-${offset}px)`;
                }
            });
            
            // 滚动时也更新位置
            window.visualViewport.addEventListener('scroll', () => {
                const vv = window.visualViewport;
                const inputContainer = document.querySelector('.input-container');
                if (inputContainer && vv) {
                    const offset = window.innerHeight - vv.height - vv.offsetTop;
                    if (offset > 0) {
                        inputContainer.style.transform = `translateY(-${offset}px)`;
                    } else {
                        inputContainer.style.transform = '';
                    }
                }
            });
        }

        // 初始化连接
        connect();

        // 聚焦输入框
        messageInput.focus();
        
        // 初始化模式 UI
        updateModeUI();
        
        // 设置按钮事件
        settingsBtn.addEventListener('click', openSettings);
        settingsClose.addEventListener('click', closeSettings);
        settingsOverlay.addEventListener('click', (e) => {
            if (e.target === settingsOverlay) closeSettings();
        });
        
        // 模式切换事件
        modeCover.addEventListener('click', () => setCopyMode('cover'));
        modeAdd.addEventListener('click', () => setCopyMode('add'));
        
        // 新会话按钮事件
        newSessionBtn.addEventListener('click', () => {
            sendNewSession();
        });
    </script>
    </div>
</body>
</html>
